upstream frontend {
  server frontend:80;
}

upstream auth_service {
  server auth-service:8000;
}

upstream sessions_service {
  server sessions-service:8000;
}

upstream bookings_service {
  server bookings-service:8000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  location /api/auth/ {
    proxy_pass http://auth_service/api/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/sessions/ {
    proxy_pass http://sessions_service/api/sessions/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/bookings/ {
    proxy_pass http://bookings_service/api/bookings/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
